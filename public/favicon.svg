<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#00f5ff" stroke-width="4" filter="url(#glow)" stroke-dasharray="120 40" stroke-linecap="round"/>
  <circle cx="32" cy="14" r="6" fill="#ff3366" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="5" fill="#ff00ff" filter="url(#glow)"/>
</svg>
